    <script>
      // Gracefully suppress benign Vite WebSocket HMR connection errors in sandboxed preview environments
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;
        
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (
            args[0].includes('[vite]') ||
            args[0].includes('WebSocket')
          )) {
            return;
          }
          originalError.apply(console, args);
        };

        console.warn = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (
            args[0].includes('[vite]') ||
            args[0].includes('WebSocket')
          )) {
            return;
          }
          originalWarn.apply(console, args);
        };

        window.addEventListener('error', function(e) {
          if (e.message && (
            e.message.includes('WebSocket') || 
            e.message.includes('[vite]')
          )) {
            e.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          if (e.reason && (
            (e.reason.message && (e.reason.message.includes('WebSocket') || e.reason.message.includes('[vite]'))) ||
            (typeof e.reason === 'string' && (e.reason.includes('WebSocket') || e.reason.includes('[vite]')))
          )) {
            e.preventDefault();
          }
        });
      })();
    </script>
